services:
  - type: web
    name: epl-backend
    runtime: docker
    # With rootDir set, dockerfilePath and dockerContext are relative to Backend/
    # (see Render monorepo docs). ./Dockerfile == repo's Backend/Dockerfile.
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        fromDatabase:
          name: epl-postgres
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: epl-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: epl-postgres
          property: password
      - key: FOOTBALL_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: epl-postgres
