services:
  - type: web
    name: epl-backend
    runtime: docker
    # Repo-root Dockerfile avoids Render/dashboard rootDir + dockerfilePath mismatches
    # (build context must include Backend/ — do not set rootDir: Backend for this service).
    dockerfilePath: ./Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - Backend/**
        - Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        fromDatabase:
          name: epl-postgres
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: epl-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: epl-postgres
          property: password
      - key: FOOTBALL_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: epl-postgres
