spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${PORT:8080}

# Premier League topic RSS only (not general world football feeds).
app.news.rss-urls=https://feeds.bbci.co.uk/sport/football/premier-league/rss.xml,https://www.theguardian.com/football/premierleague/rss
# Keep items that mention the competition or current/recent PL clubs (Java regex, case-insensitive).
app.news.title-filter-regex=(?i)(premier league|premiership|\\bepl\\b|arsenal|aston villa|bournemouth|brentford|brighton|burnley|chelsea|crystal palace|everton|fulham|liverpool|manchester city|manchester united|man city|man utd|newcastle|nottingham forest|tottenham|west ham|wolves|wolverhampton|ipswich|leicester|southampton|leeds|sheffield united|luton)
# Optional: drop items whose title/summary match this regex (e.g. other leagues). Leave empty to avoid false drops on transfer/world news that still mentions the PL.
app.news.exclude-regex=
app.news.max-articles=24

# YouTube Data API v3 — used to resolve direct /watch?v= links for match highlights on the home page.
# Set YOUTUBE_API_KEY in the environment (e.g. Render). Without a key, the API returns url=null and the client falls back to a search link.
app.youtube.api-key=${YOUTUBE_API_KEY:}
# Defaults to Fubo Sports (UCiPywDqO1dB34oxfEjjbQnw). Override if needed.
app.youtube.channel-id=${YOUTUBE_CHANNEL_ID:UCiPywDqO1dB34oxfEjjbQnw}